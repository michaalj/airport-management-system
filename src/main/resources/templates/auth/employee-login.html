<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Logowanie Pracownika</title>
  <style>
    body {display:flex; flex-direction:column; align-items:center; min-height:100vh; background:#f4f4f4; margin:0; font-family: Arial, sans-serif;}
    .header {width:100%; background:#17a2b8; padding:40px 0;}
    .header h1 {color:white; font-size:2em; text-align:center; margin:0;}
    .content-form {margin-top:60px; display:flex; flex-direction:column; align-items:center; width: 100%; max-width: 500px; padding: 20px; background-color: white; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1);}
    .form-label-container {display: flex; align-items: center; width: 100%; margin-bottom: 20px;}
    .form-label {font-size:1.2em; margin-right: 10px; white-space: nowrap;}
    .form-input {font-size:1.1em; padding:10px; flex-grow: 1; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px;}
    .error-message {color:red; font-size:1em; margin-bottom:20px; text-align:center;}
    .button-container {display:flex; justify-content: center; gap:20px; margin-top:20px; width:100%;}
    .action-button {padding:15px 40px; color:white; border:none; border-radius:8px; font-size:1.1em; cursor:pointer; text-decoration:none; text-align: center; min-width: 150px;}
    .login-button {background:#17a2b8;}
    .login-button:hover {background:#138496;}
    .cancel-button {background-color: #6c757d;}
    .cancel-button:hover {background-color: #5a6268;}
  </style>
  <script>
    function confirmLeave(event, targetUrl) {
      if (confirm("CZY NAPEWNO CHCESZ OPUŚCIĆ STRONĘ LOGOWANIA?")) {
        window.location.href = targetUrl;
      }
      return false;
    }
  </script>
</head>
<body>
<div class="header"><h1>Logowanie Pracownika</h1></div>

<form th:action="@{/auth/employee/authenticate}" method="post" class="content-form">
  <div class="form-label-container">
    <label for="pesel" class="form-label">Podaj PESEL:</label>
    <input type="text" id="pesel" name="pesel" required class="form-input" th:value="${pesel}" autocomplete="off" pattern="\d{11}" title="PESEL musi składać się z 11 cyfr.">
  </div>
  <div th:if="${error}" class="error-message">
    <span th:text="${error}"></span>
  </div>
  <div class="button-container">
    <button type="submit" class="action-button login-button">Zaloguj</button>
    <a href="#" th:onclick="'return confirmLeave(event, \'' + @{/} + '\');'" class="action-button cancel-button">Anuluj</a>
  </div>
</form>

</body>
</html>
