<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Odprawa – Start</title>
    <style>
        body {display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; background:#fff; margin:0; font-family: Arial, sans-serif;}
        .header {width:100%; background:#5667c6; padding:40px 0;}
        .header h1 {color:white; font-size:2em; text-align:center; margin:0;}
        .content-form {margin-top:60px;}
        .action-button {padding:20px 50px; background:#5667c6; color:white; border:none; border-radius:8px; font-size:1.2em; cursor:pointer; text-decoration: none;}
        .action-button:hover {background:#4a5aaf;}
    </style>
</head>
<body>

<div class="header">
    <h1>WITAMY W PROCESIE ODPRAWY</h1>
</div>

<form th:action="@{/checkin/form}" method="get" class="content-form">
    <button type="submit" class="action-button">
        Pobierz kartę pokładową
    </button>
</form>

</body>
</html>
