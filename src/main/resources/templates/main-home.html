<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>System Lotniskowy - Witamy</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #f4f4f4;
      font-family: Arial, sans-serif;
    }
    .header {
      width: 100%;
      background: #5667c6;
      padding: 30px 0;
    }
    .header h1 {
      color: white;
      font-size: 2.8em;
      text-align: center;
      margin: 0;
    }
    .role-selection-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 25px;
      margin-top: 80px;
      width: 100%;
      max-width: 400px;
    }
    .role-button {
      padding: 20px 0;
      border: none;
      border-radius: 8px;
      font-size: 1.5em;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      width: 100%;
      box-sizing: border-box;
      transition: background-color 0.3s ease;
    }
    .role-button.employee {
      background-color: #17a2b8;
      color: white;
    }
    .role-button.employee:hover {
      background-color: #138496;
    }
    .role-button.passenger {
      background-color: #28a745;
      color: white;
    }
    .role-button.passenger:hover {
      background-color: #218838;
    }
  </style>
</head>
<body>

<div class="header">
  <h1>System Lotniskowy</h1>
</div>

<div class="role-selection-container">
  <a th:href="@{/auth/employee/login}" class="role-button employee">Jestem Pracownikiem</a>
  <a th:href="@{/auth/passenger/login}" class="role-button passenger">Jestem Pasażerem</a>
</div>

</body>
</html>
